services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desafio-pos-clean-architecture
    env_file:
      - .env.local
    ports:
      - "8080:8080"
      - "8081:8081"
      - "50051:50051"
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

volumes:
  sqlite_data:
